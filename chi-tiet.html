<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chi tiết sản phẩm — Mẫu Làm Video</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0812; --surface:#151027; --surface-2:#1B1530;
    --purple:#8B5CF6; --purple-soft:#A78BFA; --blue:#3B82F6;
    --orange:#F97316; --red:#EF4444; --green:#22C55E; --pink:#F43F5E;
    --text:#F5F3FA; --text-dim: rgba(245,243,250,0.62); --line: rgba(167,139,250,0.14);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); color:var(--text); font-family:'Inter', sans-serif;
    line-height:1.6; -webkit-font-smoothing:antialiased;
  }
  h1,h2{font-family:'Fraunces', serif; font-weight:600; letter-spacing:-0.01em;}
  a{color:inherit;}
  .mono{font-family:'IBM Plex Mono', monospace;}

  .topbar{
    position:sticky; top:0; z-index:40; background:rgba(10,8,18,0.85); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between;
    padding:16px 32px;
  }
  .brand{display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px;}
  .brand .bicon{
    width:34px; height:34px; border-radius:9px; background:linear-gradient(135deg,var(--purple),var(--blue));
    display:flex; align-items:center; justify-content:center; font-size:16px;
  }
  .brand .accent{color:var(--purple-soft);}
  .back-link{font-size:14px; color:var(--text-dim); display:flex; align-items:center; gap:6px;}
  .back-link:hover{color:var(--text);}

  .wrap{max-width:920px; margin:0 auto; padding:48px 32px 100px;}

  .breadcrumb{font-size:13px; color:var(--text-dim); margin-bottom:22px;}
  .breadcrumb a:hover{color:var(--purple-soft);}

  .cover{
    aspect-ratio:16/7; border-radius:18px; margin-bottom:32px; position:relative; overflow:hidden;
    background:linear-gradient(160deg,#2A1B5C,#141024 65%);
    display:flex; align-items:flex-end; padding:20px;
  }
  .badge-row{display:flex; gap:8px;}
  .tag-chip{
    font-size:11px; font-weight:700; padding:5px 10px; border-radius:999px; color:#fff;
  }
  .tag-chip.discount{background:linear-gradient(135deg,var(--orange),var(--red));}
  .tag-chip.new{background:rgba(34,197,94,0.9);}
  .tag-chip.type{background:rgba(20,16,36,0.85); border:1px solid rgba(245,243,250,0.18);}

  h1#pTitle{font-size:clamp(26px,3.4vw,38px); margin-bottom:14px; line-height:1.2;}
  #pSubtitle{font-size:16px; color:var(--text-dim); margin-bottom:30px;}

  .price-row{
    display:flex; align-items:center; gap:14px; margin-bottom:34px; flex-wrap:wrap;
  }
  .price-now{font-family:'Fraunces', serif; font-size:28px; font-weight:600; color:var(--purple-soft);}
  .price-old{font-size:16px; color:var(--text-dim); text-decoration:line-through;}
  .price-badge{
    background:linear-gradient(135deg,var(--orange),var(--red)); color:#fff;
    font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px;
  }

  .cta-row{display:flex; gap:14px; margin-bottom:44px; flex-wrap:wrap;}
  .btn{
    display:inline-flex; align-items:center; gap:9px;
    padding:14px 28px; border-radius:999px; border:none;
    font-size:15px; font-weight:700; cursor:pointer; text-decoration:none;
    transition:filter .2s, transform .15s ease;
  }
  .btn.primary{
    background:linear-gradient(135deg,var(--purple),var(--purple-soft)); color:#0A0812;
    box-shadow:0 0 30px rgba(139,92,246,0.35);
  }
  .btn.primary:hover{filter:brightness(1.1); transform:translateY(-1px);}
  .btn.zalo{
    background:#0068FF; color:#fff;
  }
  .btn.zalo:hover{filter:brightness(1.1); transform:translateY(-1px);}

  .section{margin-bottom:40px;}
  .section h2{font-size:20px; margin-bottom:16px;}
  #pFeatures{list-style:none; display:flex; flex-direction:column; gap:12px;}
  #pFeatures li{
    display:flex; gap:12px; align-items:flex-start; font-size:14.5px; color:var(--text-dim);
    background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:14px 16px;
  }
  #pFeatures li .dot{
    width:20px; height:20px; border-radius:6px; background:rgba(139,92,246,0.16); color:var(--purple-soft);
    display:flex; align-items:center; justify-content:center; font-size:11px; flex-shrink:0; margin-top:1px;
  }
  #pDesc{font-size:15px; color:var(--text-dim);}

  .contact-card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:28px;
    display:flex; align-items:center; justify-content:space-between; gap:20px; flex-wrap:wrap;
  }
  .contact-card h3{font-size:17px; margin-bottom:6px;}
  .contact-card p{font-size:13.5px; color:var(--text-dim);}

  footer{
    border-top:1px solid var(--line); color:var(--text-dim); padding:26px 32px;
    font-size:12.5px; text-align:center;
  }

  @media (max-width:640px){
    .wrap{padding:32px 18px 80px;}
    .contact-card{flex-direction:column; align-items:flex-start;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand"><span class="bicon">✦</span>Mẫu Làm<span class="accent">Video</span></div>
  <a href="index.html" class="back-link">← Về trang chủ</a>
</header>

<div class="wrap">
  <div class="breadcrumb"><a href="index.html">Trang chủ</a> / <a href="index.html#cases">Sản phẩm</a> / <span id="pCrumb"></span></div>

  <div class="cover" id="pCover">
    <div class="badge-row" id="pBadges"></div>
  </div>

  <h1 id="pTitle"></h1>
  <p id="pSubtitle"></p>

  <div class="price-row">
    <span class="price-now" id="pPriceNow"></span>
    <span class="price-old" id="pPriceOld"></span>
    <span class="price-badge" id="pDiscountBadge"></span>
  </div>

  <div class="cta-row">
    <a href="https://zalo.me/0342894222" target="_blank" rel="noopener" class="btn zalo">💬 Liên hệ qua Zalo</a>
    <a href="#" class="btn primary">Dùng thử ngay →</a>
  </div>

  <div class="section">
    <h2>Mô tả</h2>
    <p id="pDesc"></p>
  </div>

  <div class="section">
    <h2>Tính năng nổi bật</h2>
    <ul id="pFeatures"></ul>
  </div>

  <div class="contact-card">
    <div>
      <h3>Cần tư vấn trước khi mua?</h3>
      <p>Nhắn Zalo để được hỗ trợ chọn gói phù hợp, giải đáp mọi thắc mắc.</p>
    </div>
    <a href="https://zalo.me/0342894222" target="_blank" rel="noopener" class="btn zalo">💬 Nhắn Zalo: 0342 894 222</a>
  </div>
</div>

<footer>© 2026 Mẫu Làm Video</footer>

<script src="products.js"></script>
<script>
  // Dữ liệu sản phẩm giờ nằm ở file products.js (dùng chung với trang chủ)
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || "1";
  const found = (typeof PRODUCTS !== 'undefined') ? PRODUCTS.find(x => x.id === id) : null;
  const p = found || (typeof PRODUCTS !== 'undefined' ? PRODUCTS[0] : null);

  if(p){
    const discountBadge = p.discount ? `<span class="tag-chip discount">⚡ ${p.discount}</span>` : '';
    const newBadge = p.isNew ? `<span class="tag-chip new">✦ Mới</span>` : '';
    const typeBadge = `<span class="tag-chip type">${p.typeIcon} ${p.typeLabel}</span>`;
    const badgesHtml = discountBadge + newBadge + typeBadge;

    document.getElementById('pTitle').textContent = p.title;
    document.getElementById('pSubtitle').textContent = p.subtitle;
    document.getElementById('pCrumb').textContent = p.title;
    document.getElementById('pPriceNow').textContent = p.priceNow;
    document.getElementById('pPriceOld').textContent = p.priceOld;
    document.getElementById('pDiscountBadge').textContent = p.discount || '';
    document.getElementById('pDesc').textContent = p.desc;
    document.getElementById('pFeatures').innerHTML = p.features.map(f => `<li><span class="dot">✓</span>${f}</li>`).join('');
    document.title = p.title + " — Mẫu Làm Video";

    const coverEl = document.getElementById('pCover');
    if(p.youtube){
      coverEl.style.background = 'transparent';
      coverEl.innerHTML = `<iframe style="position:absolute; inset:0; width:100%; height:100%; border:0; border-radius:18px;" src="https://www.youtube.com/embed/${p.youtube}" title="${p.title}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe><div class="badge-row" style="position:absolute; top:20px; left:20px; z-index:2;" id="pBadges2">${badgesHtml}</div>`;
    } else {
      coverEl.style.background = p.gradient;
      coverEl.innerHTML = `<div class="badge-row" id="pBadges2">${badgesHtml}</div>`;
    }
  }
</script>
</body>
</html>
